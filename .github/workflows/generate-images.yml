name: Generate scene images

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'OpenAI API key (sk-...)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/zombie-rpg-game-lyC6D

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images
        env:
          OPENAI_API_KEY: ${{ inputs.api_key }}
        run: node zombie-rpg/tools/generate-images.js

      - name: Commit + push images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zombie-rpg/images
          if git diff --cached --quiet; then
            echo "No new images to commit."
          else
            git commit -m "Add generated scene images (DALL-E 3)"
            git push origin HEAD:claude/zombie-rpg-game-lyC6D
          fi
