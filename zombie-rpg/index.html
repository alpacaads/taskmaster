<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#0b0f0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dead Light — A Zombie RPG</title>
  <link rel="stylesheet" href="css/style.css?v=83" />
</head>
<body>

  <div id="phone-frame">

    <!-- Title screen -->
    <div id="title-screen" class="screen">
      <div class="title-bg">
        <img class="title-image" id="title-image" alt=""
             src="images/title.jpg?v=83"
             onerror="this.closest('.title-bg').classList.add('no-image')" />
        <div class="title-vignette"></div>
      </div>
      <div class="title-text">
        <h1>DEAD LIGHT</h1>
        <p class="tagline">A survivor's tale</p>
      </div>
      <div class="title-actions">
        <button class="primary-btn" onclick="Game.startNew()">▶ New Game</button>
        <button class="secondary-btn" id="continue-btn" onclick="Game.continueGame()">Continue</button>
        <button class="secondary-btn" onclick="Game.showCredits()">About</button>
      </div>
    </div>

    <!-- Main game screen -->
    <div id="game-screen" class="screen hidden">
      <!-- HUD -->
      <div class="hud">
        <div class="hud-name" id="hud-name">Ellis</div>
        <div class="hud-stats">
          <span class="stat stat-bar" title="Health">❤️
            <span class="stat-bar-track"><span class="stat-bar-fill hp" id="stat-hp-fill"></span></span>
            <b id="stat-hp">10</b>/<span id="stat-hpmax">10</span>
          </span>
          <span class="stat stat-bar" title="Stamina">⚡
            <span class="stat-bar-track"><span class="stat-bar-fill stam" id="stat-stam-fill"></span></span>
            <b id="stat-stam">5</b>/<span id="stat-stammax">5</span>
          </span>
          <span class="stat" title="Ammo">🔫 <b id="stat-ammo">3</b></span>
        </div>
      </div>

      <!-- Scene -->
      <div class="scene" id="scene">
        <div class="scene-art" id="scene-art"></div>
        <div class="scene-chapter" id="scene-chapter"></div>
      </div>

      <!-- Narrative -->
      <div class="narrative" id="narrative">
        <div class="speaker" id="speaker"></div>
        <div class="text" id="story-text"></div>
      </div>

      <!-- Choices -->
      <div class="choices" id="choices"></div>

      <!-- Footer controls -->
      <div class="footer-controls">
        <span id="preload-bar" class="preload-bar hidden"></span>
        <button class="icon-btn" onclick="Game.openInventory()" title="Inventory">🎒</button>
        <button class="icon-btn" onclick="Game.save()" title="Save">💾</button>
        <button class="icon-btn" id="mute-btn" onclick="Game.toggleMute()" title="Mute">🔊</button>
        <button class="icon-btn" onclick="Game.quitToTitle()" title="Quit">🚪</button>
      </div>
    </div>

    <!-- Combat overlay -->
    <div id="combat-screen" class="screen hidden">
      <div class="combat-backdrop" id="combat-backdrop"></div>
      <div class="combat-grain"></div>

      <div class="combat-slug">
        <span id="combat-chapter">CONTACT</span>
        <span class="combat-state">HOSTILE</span>
      </div>

      <div class="combat-enemy" id="combat-enemy">
        <div class="combat-tag">HOSTILE</div>
        <div class="enemy-name" id="enemy-name">Walker</div>
        <div class="enemy-desc" id="enemy-desc"></div>
        <div class="hp-strip" id="enemy-hp-strip"></div>
        <div class="enemy-art hidden" id="enemy-art">🧟</div>
      </div>

      <div class="combat-allies" id="combat-allies"></div>

      <div class="combat-log" id="combat-log"></div>

      <div class="combat-hero">
        <div class="hero-stat">
          <span class="hero-lbl">HP</span>
          <span class="hero-bar"><span class="hero-bar-fill hp" id="c-hp-fill"></span></span>
          <span class="hero-num"><b id="c-hp">10</b>/<span id="c-hpmax">10</span></span>
        </div>
        <div class="hero-stat">
          <span class="hero-lbl">STAM</span>
          <span class="hero-bar"><span class="hero-bar-fill stam" id="c-stam-fill"></span></span>
          <span class="hero-num"><b id="c-stam">5</b>/5</span>
        </div>
        <div class="hero-stat ammo">
          <span class="hero-lbl">AMMO</span>
          <span class="hero-num"><b id="c-ammo">3</b></span>
        </div>
      </div>

      <div class="combat-actions">
        <button class="combat-btn" onclick="Combat.act('melee')">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/>
            <line x1="13" y1="19" x2="19" y2="13"/>
            <line x1="16" y1="16" x2="20" y2="20"/>
            <line x1="19" y1="21" x2="21" y2="19"/>
          </svg>
          <span class="label">Strike</span>
        </button>
        <button class="combat-btn" onclick="Combat.act('shoot')">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 8h17v3h-5l-2 2h-3v-2H3z"/>
            <path d="M5 11l1 9h4l-1-9"/>
            <path d="M20 9h2"/>
          </svg>
          <span class="label">Fire</span>
        </button>
        <button class="combat-btn" onclick="Combat.act('brace')">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2l9 4v6c0 5.5-4 10-9 12-5-2-9-6.5-9-12V6l9-4z"/>
          </svg>
          <span class="label">Brace</span>
        </button>
        <button class="combat-btn flee" onclick="Combat.act('flee')">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="13" cy="4" r="2"/>
            <path d="M4 22l5-8-4-4 7-3 3 6 4 2"/>
          </svg>
          <span class="label">Flee</span>
        </button>
      </div>
    </div>

    <!-- Inventory modal -->
    <div id="inventory-modal" class="modal hidden">
      <div class="modal-panel">
        <div class="modal-title">🎒 Inventory</div>
        <div id="inv-list" class="inv-list"></div>
        <div class="modal-actions">
          <button class="primary-btn" onclick="Game.closeInventory()">Close</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Credits -->
    <div id="credits-modal" class="modal hidden">
      <div class="modal-panel">
        <div class="modal-title">About</div>
        <p style="font-size:14px;line-height:1.5;color:#cfd3c8">
          <b>Dead Light</b> is a short text-driven RPG inspired by survival stories
          like <i>The Walking Dead</i> and <i>The Last of Us</i>.
          Choose carefully — the dead don't forgive.
        </p>
        <div class="modal-actions">
          <button class="primary-btn" onclick="Game.hideCredits()">Back</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/sound.js?v=83"></script>
  <script src="js/overrides.js?v=83"></script>
  <script src="js/scenes.js?v=83"></script>
  <script src="js/story.js?v=83"></script>
  <script src="js/combat.js?v=83"></script>
  <script src="js/game.js?v=83"></script>
</body>
</html>
